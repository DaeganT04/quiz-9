name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-in-container:
    runs-on: ubuntu-latest
    container:
      image: daegant/quiz9:v0.1

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run tests with coverage
        run: pytest --cov=engagement_engine --cov-report=term-missing --cov-report=txt:coverage_report.txt

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_report.txt